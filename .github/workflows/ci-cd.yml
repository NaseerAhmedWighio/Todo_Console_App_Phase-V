name: Build and Push Docker Images

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/**'

  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'

  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: naseerahmedwighio
  BACKEND_IMAGE: todo-console-app-v-backend
  FRONTEND_IMAGE: todo-console-app-v-frontend

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - working-directory: ./backend
        run: |
          pip install ruff black flake8
          ruff check .
          black --check .
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - working-directory: ./frontend
        run: |
          npm ci
          npm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
          # Run tests (exit code 5 = no tests found, which is OK for now)
          set +e
          pytest --cov=. --cov-report=xml --ignore=agents_sdk
          test_result=$?
          set -e
          if [ "$test_result" -eq 5 ]; then
            echo "No tests found, skipping test step"
            exit 0
          elif [ "$test_result" -ne 0 ]; then
            exit $test_result
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - working-directory: ./frontend
        run: |
          npm ci
          npm test || exit 0

  build-backend:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: backend-sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: backend-sbom.spdx.json

  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: frontend-sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: frontend-sbom.spdx.json

  security-scan:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ needs.build-backend.outputs.tag }}

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ needs.build-frontend.outputs.tag }}

  deploy-kubernetes:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3

      - run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - run: |
          helm upgrade --install backend ./k8s/helm/backend \
            --set image.repository=${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }} \
            --set image.tag=${{ needs.build-backend.outputs.tag }}

          helm upgrade --install frontend ./k8s/helm/frontend \
            --set image.repository=${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }} \
            --set image.tag=${{ needs.build-frontend.outputs.tag }}

  notify:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always()
    steps:
      - run: echo "Pipeline finished 🚀"