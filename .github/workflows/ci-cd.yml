name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/**'
  
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'

  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: naseerahmedwighio
  DOCKERHUB_REPO: todo-console-app-v
  BACKEND_IMAGE: todo-console-app-v-backend
  FRONTEND_IMAGE: todo-console-app-v-frontend

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install ruff black flake8

      - name: Lint backend code
        working-directory: ./backend
        run: |
          ruff check . || true
          black --check . || true
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm ci

      - name: Lint frontend code
        working-directory: ./frontend
        run: |
          npm run lint || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run backend tests
        working-directory: ./backend
        run: |
          pytest --cov=. --cov-report=xml || true
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test || true
        continue-on-error: true

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            PIP_DEFAULT_TIMEOUT=100
            PIP_RETRIES=5

      - name: Generate backend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: backend-sbom.spdx.json

      - name: Upload backend SBOM
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: backend-sbom.spdx.json

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push frontend image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NPM_CONFIG_RETRY=5
            NPM_CONFIG_FETCH_RETRIES=5
            NPM_CONFIG_FETCH_RETRY_MINTIMEOUT=10000
            NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT=60000
            NEXT_PUBLIC_API_BASE_URL=http://localhost:7860

      - name: Generate frontend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: frontend-sbom.spdx.json

      - name: Upload frontend SBOM
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: frontend-sbom.spdx.json

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner for backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner for frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy backend results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend-results.sarif'
        continue-on-error: true

      - name: Upload Trivy frontend results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-frontend-results.sarif'
        continue-on-error: true

  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, security-scan]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://todo-app.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubectl for Oracle Cloud
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

      - name: Update Helm values with new image tags
        run: |
          sed -i "s|repository:.*|repository: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}|g" k8s/helm/backend/values.yaml
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" k8s/helm/backend/values.yaml
          sed -i "s|repository:.*|repository: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}|g" k8s/helm/frontend/values.yaml
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" k8s/helm/frontend/values.yaml

      - name: Deploy to Kubernetes
        run: |
          export KUBECONFIG=kubeconfig
          helm upgrade --install todo-backend ./k8s/helm/backend \
            --namespace todo-app \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set env.DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set env.JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --set env.OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            --wait \
            --timeout 10m
          
          helm upgrade --install todo-frontend ./k8s/helm/frontend \
            --namespace todo-app \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment -n todo-app --timeout=300s
          kubectl get pods -n todo-app

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy-kubernetes]
    if: always()
    steps:
      - name: Send success notification
        if: needs.deploy-kubernetes.result == 'success'
        run: |
          echo "✅ Deployment successful!"
          echo "Backend: https://hub.docker.com/r/${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}"
          echo "Frontend: https://hub.docker.com/r/${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}"
          echo "Commit: ${{ github.sha }}"

      - name: Send failure notification
        if: needs.deploy-kubernetes.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "Check the workflow logs for details."
          exit 1
