name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Image version to deploy (leave empty for latest)'
        required: false
        type: string

  push:
    tags:
      - 'v*'

env:
  DOCKERHUB_USERNAME: naseerahmedwighio
  BACKEND_IMAGE: todo-console-app-v-backend
  FRONTEND_IMAGE: todo-console-app-v-frontend

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          export KUBECONFIG=$HOME/.kube/config

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Determine image tag
        id: image_tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Create namespace
        run: |
          kubectl create namespace todo-app --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend
        run: |
          helm upgrade --install todo-backend ./k8s/helm/backend \
            --namespace todo-app \
            --create-namespace \
            --set image.repository=${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }} \
            --set image.tag=${{ steps.image_tag.outputs.tag }} \
            --set replicaCount=2 \
            --wait \
            --timeout 10m

      - name: Deploy frontend
        run: |
          helm upgrade --install todo-frontend ./k8s/helm/frontend \
            --namespace todo-app \
            --create-namespace \
            --set image.repository=${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }} \
            --set image.tag=${{ steps.image_tag.outputs.tag }} \
            --set replicaCount=2 \
            --wait \
            --timeout 10m

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/todo-backend -n todo-app --timeout=300s
          kubectl rollout status deployment/todo-frontend -n todo-app --timeout=300s

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n todo-app
          echo ""
          echo "=== Services ==="
          kubectl get services -n todo-app
          echo ""
          echo "=== Deployments ==="
          kubectl get deployments -n todo-app
