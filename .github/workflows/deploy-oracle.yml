name: Deploy to Oracle Cloud (OKE)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Image version to deploy (leave empty for latest)'
        required: false
        type: string

  push:
    tags:
      - 'v*'

env:
  DOCKERHUB_USERNAME: naseerahmedwighio
  BACKEND_IMAGE: todo-console-app-v-backend
  FRONTEND_IMAGE: todo-console-app-v-frontend
  ORACLE_CLOUD_REGION: us-phoenix-1

jobs:
  deploy-oke:
    name: Deploy to Oracle Kubernetes Engine
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://todo-app.oracle.com

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Install OCI CLI
        run: |
          curl -o install.sh https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          bash install.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        run: |
          mkdir -p $HOME/.oci
          echo "${{ secrets.OCI_CONFIG }}" | base64 -d > $HOME/.oci/config

      # ✅ FIXED: directory before use
      - name: Configure kubectl for OKE
        continue-on-error: true
        run: |
          mkdir -p $HOME/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_ID }} \
            --file $HOME/.kube/config \
            --region ${{ env.ORACLE_CLOUD_REGION }} \
            --token-version 2.0.0

      # ✅ FIXED: correct condition
      - name: Alternative: Use provided kubeconfig
        if: ${{ failure() }}
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Determine image tag
        id: image_tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      # ✅ FIXED: safe EOF syntax
      - name: Update Helm values
        run: |
          cat <<EOF > k8s/helm/backend/values.yaml
replicaCount: 2

image:
  repository: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}
  pullPolicy: Always
  tag: ${{ steps.image_tag.outputs.tag }}

service:
  type: ClusterIP
  port: 7860

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

env:
  NODE_ENV: "production"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/0"
  API_PROVIDER: "openrouter"
  CHAT_MODEL: "meta-llama/llama-3.2-3b-instruct:free"
  FRONTEND_URL: "http://todo-frontend:3000"

dapr:
  enabled: true
  appId: "todo-backend"
  appPort: 7860
EOF

          cat <<EOF > k8s/helm/frontend/values.yaml
replicaCount: 2

image:
  repository: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}
  pullPolicy: Always
  tag: ${{ steps.image_tag.outputs.tag }}

service:
  type: ClusterIP
  port: 3000

env:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_BASE_URL: "http://todo-backend:7860"

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: todo-app.oracle.com
      paths:
        - path: /
          pathType: Prefix

dapr:
  enabled: true
  appId: "todo-frontend"
  appPort: 3000
EOF

      - name: Create namespace
        run: |
          kubectl create namespace todo-app --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy infrastructure
        run: |
          helm upgrade --install infrastructure ./k8s/helm/infrastructure \
            --namespace todo-app \
            --create-namespace \
            --wait \
            --timeout 10m

      - name: Apply Dapr components
        run: |
          kubectl apply -f k8s/manifests/dapr/ -n todo-app

      - name: Create Kubernetes secrets
        run: |
          kubectl create secret generic todo-app-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --namespace todo-app \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend
        run: |
          helm upgrade --install todo-backend ./k8s/helm/backend \
            --namespace todo-app \
            --set image.repository=${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }} \
            --set image.tag=${{ steps.image_tag.outputs.tag }} \
            --wait \
            --timeout 10m

      - name: Deploy frontend
        run: |
          helm upgrade --install todo-frontend ./k8s/helm/frontend \
            --namespace todo-app \
            --set image.repository=${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }} \
            --set image.tag=${{ steps.image_tag.outputs.tag }} \
            --wait \
            --timeout 10m

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/todo-backend -n todo-app --timeout=300s
          kubectl rollout status deployment/todo-frontend -n todo-app --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n todo-app
          kubectl get services -n todo-app