name: Deploy to Oracle Cloud (Docker Compose)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Image version to deploy (leave empty for latest)'
        required: false
        type: string
        default: 'latest'

  push:
    tags:
      - 'v*'

env:
  DOCKERHUB_USERNAME: naseerahmedwighio
  BACKEND_IMAGE: todo-console-app-v-backend
  FRONTEND_IMAGE: todo-console-app-v-frontend
  REGISTRY: docker.io
  SERVER_USER: opc

jobs:
  deploy-oracle:
    name: Deploy to Oracle Cloud VM
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: http://${{ secrets.SERVER_IP }}:3000

    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: image_tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker-compose.yml"
          target: "/home/opc/hackathon"
          strip_components: 1

      - name: Deploy to Oracle server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "🚀 Starting deployment to Oracle Cloud..."
            cd /home/opc/hackathon

            # Create .env file from secrets (with defaults for optional values)
            cat > .env << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            SMTP_SERVER=${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
            SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
            SMTP_USE_TLS=${{ secrets.SMTP_USE_TLS || 'true' }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            FROM_EMAIL=${{ secrets.FROM_EMAIL }}
            FRONTEND_URL=http://${{ secrets.SERVER_IP }}:3000
            API_PROVIDER=${{ secrets.API_PROVIDER || 'openrouter' }}
            CHAT_MODEL=${{ secrets.CHAT_MODEL || 'meta-llama/llama-3.2-3b-instruct:free' }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            NEXT_PUBLIC_API_BASE_URL=http://${{ secrets.SERVER_IP }}:7860
            EOF

            # Login to Docker Hub
            echo "🔐 Logging in to Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ env.DOCKERHUB_USERNAME }} --password-stdin

            # Pull images (specific tag or latest)
            echo "📥 Pulling images (tag: ${{ steps.image_tag.outputs.tag }})..."
            docker pull ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ steps.image_tag.outputs.tag }}
            docker pull ${{ env.REGISTRY }}/${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ steps.image_tag.outputs.tag }}

            # Update docker-compose.yml to use the specific tag and correct API URL
            echo "📝 Updating docker-compose.yml with tag: ${{ steps.image_tag.outputs.tag }}"
            sed -i "s|naseerahmedwighio/todo-console-app-v-backend:latest|naseerahmedwighio/todo-console-app-v-backend:${{ steps.image_tag.outputs.tag }}|g" docker-compose.yml
            sed -i "s|naseerahmedwighio/todo-console-app-v-frontend:latest|naseerahmedwighio/todo-console-app-v-frontend:${{ steps.image_tag.outputs.tag }}|g" docker-compose.yml
            # Update the API URL to use server IP
            sed -i "s|NEXT_PUBLIC_API_BASE_URL=http://.*|NEXT_PUBLIC_API_BASE_URL=http://${{ secrets.SERVER_IP }}:7860|g" docker-compose.yml

            # Stop existing containers
            echo "🛑 Stopping existing containers..."
            docker compose down

            # Rebuild frontend with correct API URL
            echo "🔨 Rebuilding frontend with correct API URL..."
            docker compose build frontend --build-arg NEXT_PUBLIC_API_BASE_URL=http://${{ secrets.SERVER_IP }}:7860

            # Start all services
            echo "▶️  Starting all services..."
            docker compose up -d

            # Wait for services to be healthy
            echo "⏳ Waiting for services to start..."
            sleep 45

            # Show running containers
            echo "📊 Running containers:"
            docker ps -a

            # Show logs for debugging
            echo "📋 Recent logs:"
            docker compose logs --tail=20

            # Verify health
            echo "🏥 Checking service health..."
            echo "Backend Health:"
            curl -s http://localhost:7860/health || echo "Backend not responding"
            echo "Frontend Health:"
            curl -s http://localhost:3000/health || echo "Frontend not responding"
            docker compose ps

            # Cleanup old images
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            # Logout from Docker Hub
            docker logout

            echo "✅ Deployment completed successfully!"
            echo "🌐 Frontend: http://${{ secrets.SERVER_IP }}:3000"
            echo "🔌 Backend: http://${{ secrets.SERVER_IP }}:7860"

      - name: Verify deployment
        if: always()
        run: |
          echo "Deployment to Oracle Cloud completed"
          echo "Check the server logs for detailed status"
