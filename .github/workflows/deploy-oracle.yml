name: Deploy to Oracle Cloud (OKE)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Image version to deploy (leave empty for latest)'
        required: false
        type: string

  push:
    tags:
      - 'v*'

env:
  DOCKERHUB_USERNAME: naseerahmedwighio
  BACKEND_IMAGE: todo-console-app-v-backend
  FRONTEND_IMAGE: todo-console-app-v-frontend
  ORACLE_CLOUD_REGION: us-phoenix-1

jobs:
  deploy-oke:
    name: Deploy to Oracle Kubernetes Engine
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://todo-app.oracle.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Install OCI CLI
        run: |
          curl -o install.sh https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          bash install.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        run: |
          mkdir -p $HOME/.oci
          echo "${{ secrets.OCI_CONFIG }}" | base64 -d > $HOME/.oci/config
        env:
          OCI_CONFIG: ${{ secrets.OCI_CONFIG }}

      - name: Configure kubectl for OKE
        run: |
          # Get kubeconfig from Oracle Cloud
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_ID }} \
            --file $HOME/.kube/config \
            --region ${{ env.ORACLE_CLOUD_REGION }} \
            --token-version 2.0.0
          mkdir -p $HOME/.kube
        continue-on-error: true

      - name: Alternative: Use provided kubeconfig
        if: steps.previous.failure
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          mkdir -p $HOME/.kube

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Determine image tag
        id: image_tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Update Helm values
        run: |
          # Update backend values
          cat > k8s/helm/backend/values.yaml << EOF
          replicaCount: 2
          
          image:
            repository: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}
            pullPolicy: Always
            tag: ${{ steps.image_tag.outputs.tag }}
          
          service:
            type: ClusterIP
            port: 7860
          
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          
          env:
            NODE_ENV: "production"
            KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
            CELERY_BROKER_URL: "redis://redis:6379/0"
            CELERY_RESULT_BACKEND: "redis://redis:6379/0"
            API_PROVIDER: "openrouter"
            CHAT_MODEL: "meta-llama/llama-3.2-3b-instruct:free"
            FRONTEND_URL: "http://todo-frontend:3000"
          
          dapr:
            enabled: true
            appId: "todo-backend"
            appPort: 7860
          
          livenessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 30
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 10
            periodSeconds: 5
          EOF

          # Update frontend values
          cat > k8s/helm/frontend/values.yaml << EOF
          replicaCount: 2
          
          image:
            repository: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}
            pullPolicy: Always
            tag: ${{ steps.image_tag.outputs.tag }}
          
          service:
            type: ClusterIP
            port: 3000
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          
          env:
            NODE_ENV: "production"
            NEXT_PUBLIC_API_BASE_URL: "http://todo-backend:7860"
          
          ingress:
            enabled: true
            className: "nginx"
            hosts:
              - host: todo-app.oracle.com
                paths:
                  - path: /
                    pathType: Prefix
          
          dapr:
            enabled: true
            appId: "todo-frontend"
            appPort: 3000
          EOF

      - name: Create namespace
        run: |
          kubectl create namespace todo-app --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy infrastructure
        run: |
          helm upgrade --install infrastructure ./k8s/helm/infrastructure \
            --namespace todo-app \
            --create-namespace \
            --set kafka.persistence.size=10Gi \
            --set zookeeper.persistence.size=5Gi \
            --set redis.persistence.size=5Gi \
            --wait \
            --timeout 10m

      - name: Apply Dapr components
        run: |
          kubectl apply -f k8s/manifests/dapr/ -n todo-app

      - name: Create Kubernetes secrets
        run: |
          kubectl create secret generic todo-app-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            --from-literal=SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}" \
            --from-literal=SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
            --from-literal=FROM_EMAIL="${{ secrets.FROM_EMAIL }}" \
            --namespace todo-app \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend
        run: |
          helm upgrade --install todo-backend ./k8s/helm/backend \
            --namespace todo-app \
            --create-namespace \
            --set image.repository=${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }} \
            --set image.tag=${{ steps.image_tag.outputs.tag }} \
            --set env.DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set env.JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --set env.OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            --set env.SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}" \
            --set env.SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
            --set env.FROM_EMAIL="${{ secrets.FROM_EMAIL }}" \
            --wait \
            --timeout 10m

      - name: Deploy frontend
        run: |
          helm upgrade --install todo-frontend ./k8s/helm/frontend \
            --namespace todo-app \
            --create-namespace \
            --set image.repository=${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }} \
            --set image.tag=${{ steps.image_tag.outputs.tag }} \
            --set ingress.enabled=true \
            --set ingress.hosts[0].host=todo-app.oracle.com \
            --wait \
            --timeout 10m

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/todo-backend -n todo-app --timeout=300s
          kubectl rollout status deployment/todo-frontend -n todo-app --timeout=300s

      - name: Verify deployment
        run: |
          echo "=== Pods Status ==="
          kubectl get pods -n todo-app
          
          echo "=== Services Status ==="
          kubectl get services -n todo-app
          
          echo "=== Dapr Components ==="
          kubectl get components -n todo-app
          
          echo "=== Ingress Status ==="
          kubectl get ingress -n todo-app

      - name: Test backend health
        run: |
          # Get backend service IP
          BACKEND_IP=$(kubectl get svc todo-backend -n todo-app -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "localhost")
          
          # Test health endpoint
          curl -f http://$BACKEND_IP:7860/health || \
          kubectl port-forward -n todo-app svc/todo-backend 7860:7860 &
          sleep 5
          curl -f http://localhost:7860/health

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully deployed to Oracle Cloud (OKE)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.image_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ steps.image_tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ steps.image_tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Access URLs" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: https://todo-app.oracle.com" >> $GITHUB_STEP_SUMMARY
          echo "- Backend API: https://todo-app.oracle.com/api" >> $GITHUB_STEP_SUMMARY
          echo "- API Docs: https://todo-app.oracle.com/docs" >> $GITHUB_STEP_SUMMARY
