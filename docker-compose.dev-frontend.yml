# Development Docker Compose - Frontend Only in Docker
# Use this when backend is running locally (python -m uvicorn main:app --reload --port 7860)
# Usage: docker-compose -f docker-compose.dev-frontend.yml up -d

services:
  frontend:
    image: node:18-bookworm
    container_name: todo-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_BASE_URL=http://host.docker.internal:7860
    volumes:
      # Mount source code for live reloading
      - ./frontend/src:/app/src:rw
      - ./frontend/public:/app/public:rw
      - ./frontend/next.config.js:/app/next.config.js:rw
      - ./frontend/package.json:/app/package.json:rw
      - ./frontend/tsconfig.json:/app/tsconfig.json:rw
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:rw
      - ./frontend/postcss.config.js:/app/postcss.config.js:rw
      # Persist node_modules
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - todo-network-frontend

networks:
  todo-network-frontend:
    driver: bridge

volumes:
  frontend_node_modules:
  frontend_next_cache:
