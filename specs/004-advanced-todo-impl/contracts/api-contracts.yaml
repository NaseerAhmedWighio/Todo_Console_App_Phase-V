# API Contracts: Advanced Todo Features Implementation

**Feature**: 004-advanced-todo-impl
**Date**: 2026-02-20
**Format**: OpenAPI 3.0 (YAML)

---

## Overview

This document defines the API contracts for all advanced todo features. All endpoints require JWT authentication via `Authorization: Bearer <token>` header.

---

## OpenAPI Specification

```yaml
openapi: 3.0.3
info:
  title: Advanced Todo API
  description: API for advanced todo features including priorities, tags, due dates, search, filter, sort, recurring tasks, and reminders
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: https://api.todo-app.com/api/v1
    description: Production server
  - url: http://localhost:8000/api/v1
    description: Development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from Better Auth

  schemas:
    # Task Schemas
    Task:
      type: object
      required:
        - id
        - title
        - user_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        is_completed:
          type: boolean
          default: false
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
        due_date:
          type: string
          format: date-time
          nullable: true
        timezone:
          type: string
          default: UTC
        is_recurring:
          type: boolean
          default: false
        recurring_task_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/Reminder'

    TaskCreate:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
        due_date:
          type: string
          format: date-time
          nullable: true
        tags:
          type: array
          items:
            type: string
            format: uuid
          description: Array of tag IDs to assign

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        is_completed:
          type: boolean
        priority:
          type: string
          enum: [low, medium, high, urgent]
        due_date:
          type: string
          format: date-time
          nullable: true
        tags:
          type: array
          items:
            type: string
            format: uuid
          description: Replace all tags with these

    # Tag Schemas
    Tag:
      type: object
      required:
        - id
        - user_id
        - name
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 50
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
          default: '#6B7280'
        created_at:
          type: string
          format: date-time
        usage_count:
          type: integer
          description: Number of tasks with this tag

    TagCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
          default: '#6B7280'

    # Reminder Schemas
    Reminder:
      type: object
      required:
        - id
        - task_id
        - scheduled_time
        - status
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        timing_minutes:
          type: integer
          default: 0
          minimum: 0
        timing_days:
          type: integer
          nullable: true
          minimum: 0
        delivery_channel:
          type: string
          enum: [in_app, email, web_push, sms]
          default: in_app
        scheduled_time:
          type: string
          format: date-time
        sent_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, sent, failed, cancelled]
          default: pending
        created_at:
          type: string
          format: date-time

    ReminderCreate:
      type: object
      required:
        - task_id
      properties:
        task_id:
          type: string
          format: uuid
        timing_minutes:
          type: integer
          default: 0
          minimum: 0
        timing_days:
          type: integer
          nullable: true
          minimum: 0
        delivery_channel:
          type: string
          enum: [in_app, email, web_push, sms]
          default: in_app

    # Recurring Task Schemas
    RecurringTask:
      type: object
      required:
        - id
        - task_id
        - recurrence_pattern
        - is_active
      properties:
        id:
          type: string
          format: uuid
        series_id:
          type: string
          format: uuid
          nullable: true
        task_id:
          type: string
          format: uuid
        recurrence_pattern:
          type: string
          enum: [daily, weekly, monthly, yearly, custom]
        interval:
          type: integer
          minimum: 1
          default: 1
        by_weekday:
          type: string
          description: Comma-separated integers 0-6 (0=Monday)
          nullable: true
        by_monthday:
          type: integer
          minimum: 1
          maximum: 31
          nullable: true
        by_month:
          type: string
          description: Comma-separated integers 1-12
          nullable: true
        end_condition:
          type: string
          enum: [never, after_occurrences, on_date]
          default: never
        end_occurrences:
          type: integer
          nullable: true
          minimum: 1
        end_date:
          type: string
          format: date-time
          nullable: true
        next_due_date:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time

    RecurringTaskCreate:
      type: object
      required:
        - recurrence_pattern
      properties:
        recurrence_pattern:
          type: string
          enum: [daily, weekly, monthly, yearly, custom]
        interval:
          type: integer
          minimum: 1
          default: 1
        by_weekday:
          type: string
          nullable: true
        by_monthday:
          type: integer
          minimum: 1
          maximum: 31
          nullable: true
        by_month:
          type: string
          nullable: true
        end_condition:
          type: string
          enum: [never, after_occurrences, on_date]
          default: never
        end_occurrences:
          type: integer
          nullable: true
          minimum: 1
        end_date:
          type: string
          format: date-time
          nullable: true

    # Search Schemas
    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer
        query:
          type: string
        filters:
          type: object
          properties:
            priority:
              type: string
            status:
              type: string
            tag_id:
              type: string
              format: uuid

    # Event Schemas
    DomainEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
          enum:
            - task.created
            - task.updated
            - task.completed
            - task.deleted
            - task.reminder_sent
            - recurring.instance_generated
        aggregate_id:
          type: string
          format: uuid
        aggregate_type:
          type: string
        user_id:
          type: string
          format: uuid
        payload:
          type: object
        published:
          type: boolean
        processed:
          type: boolean
        created_at:
          type: string
          format: date-time

    # Pagination
    PaginatedTasks:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        has_more:
          type: boolean

paths:
  # Task Endpoints
  /todos:
    get:
      summary: List tasks with filters and sorting
      operationId: listTasks
      security:
        - bearerAuth: []
      tags:
        - Tasks
      parameters:
        - name: status
          in: query
          schema:
            type: boolean
          description: Filter by completion status (true=completed, false=active)
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
          description: Filter by priority level
        - name: tag_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by tag ID
        - name: due_date_from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter tasks with due date >= this
        - name: due_date_to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter tasks with due date <= this
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [due_date, priority, created_at, title]
            default: created_at
          description: Sort field
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of tasks to return
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTasks'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    post:
      summary: Create a new task
      operationId: createTask
      security:
        - bearerAuth: []
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad request
        '401':
          description: Unauthorized

  /todos/{task_id}:
    get:
      summary: Get a specific task by ID
      operationId: getTask
      security:
        - bearerAuth: []
      tags:
        - Tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (task belongs to another user)

    put:
      summary: Update a task
      operationId: updateTask
      security:
        - bearerAuth: []
      tags:
        - Tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad request
        '404':
          description: Task not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    delete:
      summary: Delete a task
      operationId: deleteTask
      security:
        - bearerAuth: []
      tags:
        - Tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Task deleted
        '404':
          description: Task not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  # Tag Endpoints
  /tags:
    get:
      summary: List all tags for the current user
      operationId: listTags
      security:
        - bearerAuth: []
      tags:
        - Tags
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        '401':
          description: Unauthorized

    post:
      summary: Create a new tag
      operationId: createTag
      security:
        - bearerAuth: []
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
      responses:
        '201':
          description: Tag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          description: Bad request (duplicate name)
        '401':
          description: Unauthorized

  /tags/{tag_id}:
    delete:
      summary: Delete a tag
      operationId: deleteTag
      security:
        - bearerAuth: []
      tags:
        - Tags
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Tag deleted
        '404':
          description: Tag not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  # Reminder Endpoints
  /reminders:
    get:
      summary: List all reminders for the current user
      operationId: listReminders
      security:
        - bearerAuth: []
      tags:
        - Reminders
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reminder'
        '401':
          description: Unauthorized

    post:
      summary: Create a new reminder
      operationId: createReminder
      security:
        - bearerAuth: []
      tags:
        - Reminders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderCreate'
      responses:
        '201':
          description: Reminder created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        '400':
          description: Bad request (task has no due date)
        '401':
          description: Unauthorized

  /reminders/{reminder_id}:
    delete:
      summary: Delete a reminder
      operationId: deleteReminder
      security:
        - bearerAuth: []
      tags:
        - Reminders
      parameters:
        - name: reminder_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Reminder deleted
        '404':
          description: Reminder not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  # Recurring Task Endpoints
  /todos/{task_id}/recurring:
    post:
      summary: Configure a task as recurring
      operationId: configureRecurring
      security:
        - bearerAuth: []
      tags:
        - Recurring Tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecurringTaskCreate'
      responses:
        '201':
          description: Recurring configuration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringTask'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    get:
      summary: Get recurring configuration for a task
      operationId: getRecurring
      security:
        - bearerAuth: []
      tags:
        - Recurring Tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringTask'
        '404':
          description: Not a recurring task
        '401':
          description: Unauthorized

    put:
      summary: Update recurring configuration
      operationId: updateRecurring
      security:
        - bearerAuth: []
      tags:
        - Recurring Tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecurringTaskCreate'
      responses:
        '200':
          description: Recurring configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringTask'
        '400':
          description: Bad request
        '404':
          description: Not a recurring task
        '401':
          description: Unauthorized

    delete:
      summary: Remove recurring configuration
      operationId: deleteRecurring
      security:
        - bearerAuth: []
      tags:
        - Recurring Tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: delete_all_instances
          in: query
          schema:
            type: boolean
            default: false
          description: If true, delete all generated instances too
      responses:
        '204':
          description: Recurring configuration removed
        '404':
          description: Not a recurring task
        '401':
          description: Unauthorized

  # Search Endpoint
  /search:
    get:
      summary: Search tasks with full-text search
      operationId: searchTasks
      security:
        - bearerAuth: []
      tags:
        - Search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
          description: Filter by priority
        - name: status
          in: query
          schema:
            type: boolean
          description: Filter by completion status
        - name: tag_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by tag ID
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '401':
          description: Unauthorized

  # Event Monitoring Endpoint
  /events:
    get:
      summary: List domain events (for monitoring)
      operationId: listEvents
      security:
        - bearerAuth: []
      tags:
        - Events
      parameters:
        - name: event_type
          in: query
          schema:
            type: string
          description: Filter by event type
        - name: published
          in: query
          schema:
            type: boolean
          description: Filter by published status
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DomainEvent'
        '401':
          description: Unauthorized

  # Health Check Endpoints
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
        '503':
          description: Service unavailable

  /health/dapr:
    get:
      summary: Dapr sidecar health check
      operationId: daprHealthCheck
      tags:
        - Health
      responses:
        '200':
          description: Dapr sidecar is connected
        '503':
          description: Dapr sidecar not available
```

---

## Endpoint Summary

### Tasks
| Method | Endpoint | Description |
|--------|----------|-------------|
| GET | `/todos` | List tasks with filters and sorting |
| POST | `/todos` | Create a new task |
| GET | `/todos/{task_id}` | Get a specific task |
| PUT | `/todos/{task_id}` | Update a task |
| DELETE | `/todos/{task_id}` | Delete a task |

### Tags
| Method | Endpoint | Description |
|--------|----------|-------------|
| GET | `/tags` | List user's tags |
| POST | `/tags` | Create a new tag |
| DELETE | `/tags/{tag_id}` | Delete a tag |

### Reminders
| Method | Endpoint | Description |
|--------|----------|-------------|
| GET | `/reminders` | List user's reminders |
| POST | `/reminders` | Create a reminder |
| DELETE | `/reminders/{reminder_id}` | Delete a reminder |

### Recurring Tasks
| Method | Endpoint | Description |
|--------|----------|-------------|
| POST | `/todos/{task_id}/recurring` | Configure recurring pattern |
| GET | `/todos/{task_id}/recurring` | Get recurring config |
| PUT | `/todos/{task_id}/recurring` | Update recurring config |
| DELETE | `/todos/{task_id}/recurring` | Remove recurring config |

### Search
| Method | Endpoint | Description |
|--------|----------|-------------|
| GET | `/search` | Full-text search tasks |

### Events
| Method | Endpoint | Description |
|--------|----------|-------------|
| GET | `/events` | List domain events (monitoring) |

### Health
| Method | Endpoint | Description |
|--------|----------|-------------|
| GET | `/health` | General health check |
| GET | `/health/dapr` | Dapr sidecar health |

---

## Error Response Format

```json
{
  "detail": "Error message description",
  "status_code": 400,
  "errors": [
    {
      "field": "priority",
      "message": "Invalid priority value. Must be one of: low, medium, high, urgent"
    }
  ]
}
```

---

## Authentication

All endpoints (except health checks) require JWT authentication:

```
Authorization: Bearer <jwt_token>
```

JWT tokens are obtained from Better Auth after successful login.

---

## Rate Limiting

- Default: 100 requests per minute per user
- Search: 30 requests per minute per user
- Bulk operations: 10 requests per minute per user

Rate limit headers included in responses:
```
X-RateLimit-Limit: 100
X-RateLimit-Remaining: 95
X-RateLimit-Reset: 1645369200
```
