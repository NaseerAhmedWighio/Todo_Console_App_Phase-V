[tool.black]
line-length = 120
target-version = ['py311']
exclude = '''
/(
    \.venv
    | venv
    | __pycache__
    | \.git
    | node_modules
    | dist
    | build
)/
'''

[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
    ".venv",
    "venv",
    "__pycache__",
    ".git",
    "node_modules",
    "dist",
    "build",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = [
    "E501",  # Line length handled by black
    "E712",  # Allow equality comparisons to True/False (SQLModel requirement)
    "E722",  # Allow bare except (for simple error handling)
    "E402",  # Allow module level imports (for lazy imports)
    "F821",  # Allow forward references in type hints
]
