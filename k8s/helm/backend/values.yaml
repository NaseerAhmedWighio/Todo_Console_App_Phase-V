# Default values for todo-backend
replicaCount: 1

image:
  repository: todo-app-phase-v-backend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "todo-backend"

# Service Configuration
service:
  type: ClusterIP
  port: 7860
  targetPort: 7860

# Ingress Configuration
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: todo-backend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource Limits
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Environment Variables
env:
  NODE_ENV: "production"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/0"
  API_PROVIDER: "openrouter"
  CHAT_MODEL: "meta-llama/llama-3.2-3b-instruct:free"
  FRONTEND_URL: "http://todo-frontend:3000"
  
  # Secrets - should be set via Kubernetes Secrets
  DATABASE_URL: ""
  JWT_SECRET: ""
  OPENROUTER_API_KEY: ""
  SMTP_SERVER: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USE_TLS: "true"

# Dapr Configuration
dapr:
  enabled: true
  appId: "todo-backend"
  appPort: 7860
  appProtocol: http
  logLevel: "info"
  config: ""

# Probes
livenessProbe:
  httpGet:
    path: /health
    port: 7860
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 7860
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Persistence
persistence:
  enabled: false
  size: 1Gi

# Infrastructure dependencies
infrastructure:
  enabled: true
