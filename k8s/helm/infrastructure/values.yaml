# Default values for infrastructure components

# Kafka Configuration
kafka:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  persistence:
    enabled: true
    size: 5Gi
  service:
    type: ClusterIP
    port: 9092

# Zookeeper Configuration
zookeeper:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"
  persistence:
    enabled: true
    size: 2Gi

# Redis Configuration
redis:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "100m"
  persistence:
    enabled: true
    size: 1Gi
  service:
    type: ClusterIP
    port: 6379

# Dapr Configuration
dapr:
  enabled: true
  ha:
    enabled: false
  mtls:
    enabled: true
