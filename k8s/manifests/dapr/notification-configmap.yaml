apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-notification-config
  namespace: default
data:
  # Notification settings
  NOTIFICATION_ENABLED: "true"
  NOTIFICATION_CHECK_INTERVAL_MINUTES: "1"
  
  # SMTP Configuration
  SMTP_SERVER: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USE_TLS: "true"
  FROM_EMAIL: "noreply@todoapp.com"
  
  # Dapr settings
  DAPR_HTTP_PORT: "3500"
  DAPR_GRPC_PORT: "50001"
  DAPR_PUBSUB_NAME: "kafka-pubsub"
  
  # Recurring notification settings
  RECURRING_NOTIFICATION_ENABLED: "true"
  RECURRING_CHECK_INTERVAL_MINUTES: "5"
