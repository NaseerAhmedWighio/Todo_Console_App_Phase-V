apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todo-app-4.fullname" . }}-frontend
  labels:
    {{- include "todo-app-4.labels" . | nindent 4 }}
    app: frontend
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.frontend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "todo-app-4.selectorLabels" . | nindent 6 }}
      app: frontend
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "todo-app-4.labels" . | nindent 8 }}
        app: frontend
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "todo-app-4.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: frontend
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.targetPort }}
              protocol: TCP
          livenessProbe:
            {{- if .Values.localDev.enabled }}
            exec:
              command:
              - sh
              - -c
              - "pgrep next || pgrep node || echo 'Checking if frontend is running'"
            {{- else }}
            httpGet:
              path: /
              port: http
            {{- end }}
          readinessProbe:
            {{- if .Values.localDev.enabled }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: /
              port: http
            {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          env:
            - name: BACKEND_URL
              value: "http://{{ include "todo-app-4.fullname" . }}-backend:{{ .Values.backend.service.port }}"
          {{- if .Values.localDev.mountLocalSources }}
          volumeMounts:
            - name: frontend-source
              mountPath: /app
              readOnly: false
          {{- end }}
      {{- if .Values.localDev.mountLocalSources }}
      volumes:
        - name: frontend-source
          hostPath:
            path: {{ .Values.localDev.localSourcePaths.frontend }}
            type: Directory
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}