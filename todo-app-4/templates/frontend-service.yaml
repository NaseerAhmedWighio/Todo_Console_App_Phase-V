apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-app-4.fullname" . }}-frontend
  labels:
    {{- include "todo-app-4.labels" . | nindent 4 }}
    app: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "todo-app-4.selectorLabels" . | nindent 4 }}
    app: frontend