# Development Docker Compose - Todo App Phase V
# Backend runs locally (uvicorn --reload), infrastructure + frontend in Docker
# Usage: docker-compose -f docker-compose.dev.yml up -d

version: '3.8'

services:
  frontend:
    image: node:18-bookworm
    container_name: todo-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_BASE_URL=http://host.docker.internal:7860
    volumes:
      # Mount source code for live reloading
      - ./frontend/src:/app/src:rw
      - ./frontend/public:/app/public:rw
      - ./frontend/next.config.js:/app/next.config.js:rw
      - ./frontend/package.json:/app/package.json:rw
      - ./frontend/tsconfig.json:/app/tsconfig.json:rw
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:rw
      - ./frontend/postcss.config.js:/app/postcss.config.js:rw
      # Persist node_modules
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kafka
      - redis
    networks:
      - todo-network-dev

  # Kafka for event streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper-dev
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo-network-dev

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-dev
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - todo-network-dev

  # Redis for Celery broker
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo-network-dev

networks:
  todo-network-dev:
    driver: bridge

volumes:
  redis_data:
  frontend_node_modules:
  frontend_next_cache:
